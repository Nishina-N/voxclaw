<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="/manifest.json" />
  <title>Voxclaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Login screen ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      padding: 2rem;
    }

    #login-screen h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    #login-password {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      text-align: center;
      letter-spacing: 0.2em;
      width: 100%;
    }

    #login-password:focus { border-color: #1a1a1a; }

    #login-btn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    #login-error {
      font-size: 0.85rem;
      color: #e53e3e;
      text-align: center;
      min-height: 1.2em;
    }

    #login-screen.hidden { display: none; }

    /* ── Tab bar ── */
    #tab-bar {
      display: flex;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 10px 4px 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #aaa;
      font-size: 0.65rem;
    }

    .tab-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-btn.active {
      color: #1a1a1a;
    }


    /* ── Tab panels ── */
    .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ── Chat messages ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message { display: flex; flex-direction: column; gap: 4px; }

    .message-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .message-dot {
      width: 8px;
      height: 8px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .message.user .message-dot   { background: #22c55e; }
    .message.voxclaw .message-dot { background: #f97316; }

    .message-name {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .message-time {
      font-size: 0.75rem;
      color: #999;
      margin-left: 4px;
    }

    .message-body {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #333;
      padding-left: 14px;
      white-space: pre-wrap;
    }

    .message-body .chat-image {
      display: block;
      max-width: 100%;
      max-height: 360px;
      border-radius: 8px;
      margin-top: 6px;
      object-fit: contain;
    }

    /* typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding-left: 14px;
      padding-top: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 6px 14px 14px;
      border-top: 1px solid #e5e5e5;
      background: #fff;
      flex-shrink: 0;
    }

    #btn-mic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #555;
      transition: color 0.2s;
    }

    #btn-mic svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #btn-mic.recording {
      color: #f97316;
      animation: mic-glow 1.5s ease-in-out infinite;
    }

    @keyframes mic-glow {
      0%   { box-shadow: 0 0 0px 0px rgba(249,115,22,0); }
      50%  { box-shadow: 0 0 12px 6px rgba(249,115,22,0.4); }
      100% { box-shadow: 0 0 0px 0px rgba(249,115,22,0); }
    }

    #input-text {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      background: transparent;
      line-height: 1.5;
      max-height: 120px;
      overflow-x: hidden;
      overflow-y: auto;
      color: #1a1a1a;
    }

    #input-text::placeholder { color: #bbb; }

    #btn-send {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: #e5e5e5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #btn-send.has-text { background: #1a1a1a; }

    #btn-send svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #btn-send:not(.has-text) svg { stroke: #aaa; }

    /* ── Placeholder panels ── */
    .panel-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 0.9rem;
    }

    /* ── Skills panel ── */
    #panel-skills {
      overflow-y: auto;
      padding: 16px;
      flex-direction: column;
      gap: 0;
    }

    #panel-cron {
      overflow-y: auto;
      padding: 16px;
      flex-direction: column;
      gap: 0;
    }

    #skills-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: #999;
      text-align: center;
      padding: 4px 0 16px;
      letter-spacing: 0.04em;
    }

    .skills-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 20px 0 8px;
    }

    .skills-section-title:first-child { margin-top: 0; }

    .skill-item {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .skill-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .skill-item-name {
      font-size: 0.88rem;
      font-weight: 400;
      color: #1a1a1a;
    }

    .skill-item-chevron {
      color: #bbb;
      font-size: 0.8rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .skill-item.open .skill-item-chevron { transform: rotate(180deg); }

    .skill-item-body {
      display: none;
      padding: 0 14px 12px;
      font-size: 0.82rem;
      color: #555;
      line-height: 1.55;
      border-top: 1px solid #f0f0f0;
      padding-top: 10px;
    }

    .skill-item.open .skill-item-body { display: block; }

    /* ── Cron panel ── */
    #panel-cron {
      overflow-y: auto;
      padding: 16px;
      flex-direction: column;
      gap: 0;
    }

    .cron-item-status {
      font-size: 0.72rem;
      color: #bbb;
      flex: 1;
      text-align: right;
      margin-right: 6px;
      white-space: nowrap;
    }

    .cron-item-status.scheduled { color: #22c55e; }

    .cron-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cron-field-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .cron-time-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cron-time-input {
      width: 52px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.9rem;
      font-family: monospace;
      text-align: center;
      outline: none;
    }

    .cron-time-input:focus { border-color: #1a1a1a; }

    .cron-repeat-row, .cron-dest-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .cron-repeat-row label, .cron-dest-row label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .cron-discord-row {
      display: flex;
    }

    .cron-discord-row .cron-channel-input {
      flex: 1;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      font-family: monospace;
      outline: none;
    }

    .cron-days-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .cron-day-label {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .cron-channel-input {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.82rem;
      font-family: monospace;
      outline: none;
      width: 100%;
    }

    .cron-channel-input:focus { border-color: #1a1a1a; }

    .cron-toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .cron-toggle input { opacity: 0; width: 0; height: 0; }

    .cron-toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      transition: 0.2s;
    }

    .cron-toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }

    .cron-toggle input:checked + .cron-toggle-slider { background: #1a1a1a; }
    .cron-toggle input:checked + .cron-toggle-slider::before { transform: translateX(16px); }

    .cron-actions {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .cron-save-btn {
      flex: 1;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .cron-delete-btn {
      flex: 1;
      background: transparent;
      color: #e53e3e;
      border: 1px solid #e53e3e;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Settings panel ── */
    #panel-settings {
      overflow-y: auto;
      padding: 20px 16px;
      gap: 0;
    }

    .settings-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      margin-top: 24px;
    }

    .settings-section-title:first-child { margin-top: 0; }

    .key-item, .settings-info-item {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }

    .key-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .key-item-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .key-item-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .key-item-value {
      font-size: 0.8rem;
      color: #999;
      font-family: monospace;
    }

    .key-edit-btn {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      background: transparent;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
      font-family: inherit;
    }

    .key-edit-area {
      display: none;
      margin-top: 12px;
      gap: 8px;
      flex-direction: column;
    }

    .key-edit-area.open { display: flex; }

    .key-edit-input {
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: monospace;
      outline: none;
      width: 100%;
    }

    .key-edit-actions {
      display: flex;
      gap: 8px;
    }

    .key-save-btn {
      flex: 1;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .key-cancel-btn {
      flex: 1;
      background: transparent;
      color: #555;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Task panel ── */
    #panel-task {
      overflow-y: auto;
      padding: 16px;
      flex-direction: column;
      gap: 0;
    }

    #task-items { display: contents; }

    .task-empty {
      text-align: center;
      color: #ccc;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    /* Reuse .skill-item accordion for tasks */
    .task-item .task-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .task-check {
      width: 18px;
      height: 18px;
      border: 2px solid #ccc;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .task-check.done {
      border-color: #4a4;
      background: #4a4;
    }

    .task-check.done::after {
      content: '';
      width: 8px;
      height: 5px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
    }

    .task-item-title {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 400;
      color: #1a1a1a;
    }

    .task-item.completed .task-item-title {
      color: #bbb;
      text-decoration: line-through;
    }

    .task-item-due {
      font-size: 0.75rem;
      color: #999;
      flex-shrink: 0;
    }

    .task-item-due.overdue { color: #e55; }

    .task-item .skill-item-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .task-field-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .task-notes-input {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      outline: none;
    }

    .task-due-input {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      width: 100%;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .task-save-btn {
      flex: 1;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .task-delete-btn {
      flex: 1;
      background: transparent;
      color: #e55;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
    }

    #task-add-bar {
      position: sticky;
      bottom: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0 4px;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      margin-top: 8px;
    }

    #task-add-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.9rem;
      font-family: inherit;
      color: #1a1a1a;
      background: transparent;
    }

    #task-add-input::placeholder { color: #bbb; }

    #task-add-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #1a1a1a;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen">
    <h1>Voxclaw</h1>
    <div id="login-form">
      <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="login-btn">Sign in</button>
      <p id="login-error"></p>
    </div>
  </div>

  <!-- Tab bar -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="chat">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      chat
    </button>
    <button class="tab-btn" data-tab="skills">
      <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      skills
    </button>
    <button class="tab-btn" data-tab="cron">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      cron
    </button>
    <button class="tab-btn" data-tab="task">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      task
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      settings
    </button>
  </nav>

  <!-- Chat panel -->
  <div class="tab-panel active" id="panel-chat">
    <div id="chat-messages"></div>
    <div id="input-bar">
      <button id="btn-mic">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <textarea id="input-text" rows="2" placeholder="What would you like to do?&#10;Press ⌘Enter or Ctrl+Enter to send"></textarea>
      <button id="btn-send">
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Skills panel -->
  <div class="tab-panel" id="panel-skills">
    <div id="skills-header"></div>
    <div id="skills-list"></div>
  </div>
  <div class="tab-panel" id="panel-cron">
    <div id="cron-list"></div>
  </div>
  <div class="tab-panel" id="panel-task">
    <div id="task-items"></div>
    <div id="task-add-bar">
      <input id="task-add-input" type="text" placeholder="Add a task..." />
      <button id="task-add-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Settings panel -->
  <div class="tab-panel" id="panel-settings">
    <p class="settings-section-title">API Keys</p>

    <div class="key-item" data-service="brave" data-key="api_key">
      <div class="key-item-header">
        <div class="key-item-label">
          <span class="key-item-name">Brave Search</span>
          <span class="key-item-value">not set</span>
        </div>
        <button class="key-edit-btn">Edit</button>
      </div>
      <div class="key-edit-area">
        <input class="key-edit-input" type="password" placeholder="API Key" />
        <div class="key-edit-actions">
          <button class="key-save-btn">Save</button>
          <button class="key-cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div class="key-item" data-service="mapbox" data-key="access_token">
      <div class="key-item-header">
        <div class="key-item-label">
          <span class="key-item-name">Mapbox</span>
          <span class="key-item-value">not set</span>
        </div>
        <button class="key-edit-btn">Edit</button>
      </div>
      <div class="key-edit-area">
        <input class="key-edit-input" type="password" placeholder="Access Token" />
        <div class="key-edit-actions">
          <button class="key-save-btn">Save</button>
          <button class="key-cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <p class="settings-section-title">Google</p>
    <div class="settings-info-item">
      <div class="key-item-header">
        <div class="key-item-label">
          <span class="key-item-name">Google Auth</span>
          <span class="key-item-value" id="google-auth-status">Checking...</span>
        </div>
      </div>
      <p style="font-size:0.75rem;color:#888;margin:4px 0 0;line-height:1.5">
        To set up or refresh, ask Voxclaw in chat: "Set up Google authentication".<br>
        You need to download <code>client_secret.json</code> from Google Cloud Console and place it in <code>keybinder/secrets/</code> first.
      </p>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
