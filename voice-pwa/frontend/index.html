<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="/manifest.json" />
  <title>Voxclaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Login screen ── */
    #login-screen {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      padding: 2rem;
    }

    #login-screen h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    #login-password {
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      text-align: center;
      letter-spacing: 0.2em;
      width: 100%;
    }

    #login-password:focus { border-color: #1a1a1a; }

    #login-btn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    #login-error {
      font-size: 0.85rem;
      color: #e53e3e;
      text-align: center;
      min-height: 1.2em;
    }

    #login-screen.hidden { display: none; }

    /* ── Tab bar ── */
    #tab-bar {
      display: flex;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 10px 4px 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #aaa;
      font-size: 0.65rem;
    }

    .tab-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-btn.active {
      color: #1a1a1a;
    }


    /* ── Tab panels ── */
    .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* ── Chat messages ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message { display: flex; flex-direction: column; gap: 4px; }

    .message-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .message-dot {
      width: 8px;
      height: 8px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .message.user .message-dot   { background: #22c55e; }
    .message.voxclaw .message-dot { background: #f97316; }

    .message-name {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .message-time {
      font-size: 0.75rem;
      color: #999;
      margin-left: 4px;
    }

    .message-body {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #333;
      padding-left: 14px;
      white-space: pre-wrap;
    }

    /* typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding-left: 14px;
      padding-top: 4px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      animation: typing-bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 14px 14px;
      border-top: 1px solid #e5e5e5;
      background: #fff;
      flex-shrink: 0;
    }

    #btn-mic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #555;
      transition: color 0.2s;
    }

    #btn-mic svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #btn-mic.recording {
      color: #f97316;
      animation: mic-glow 1.5s ease-in-out infinite;
    }

    @keyframes mic-glow {
      0%   { box-shadow: 0 0 0px 0px rgba(249,115,22,0); }
      50%  { box-shadow: 0 0 12px 6px rgba(249,115,22,0.4); }
      100% { box-shadow: 0 0 0px 0px rgba(249,115,22,0); }
    }

    #input-text {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      background: transparent;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      color: #1a1a1a;
    }

    #input-text::placeholder { color: #bbb; }

    #btn-send {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: #e5e5e5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #btn-send.has-text { background: #1a1a1a; }

    #btn-send svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #btn-send:not(.has-text) svg { stroke: #aaa; }

    /* ── Placeholder panels ── */
    .panel-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen">
    <h1>Voxclaw</h1>
    <div id="login-form">
      <input id="login-password" type="password" placeholder="パスワード" autocomplete="current-password" />
      <button id="login-btn">ログイン</button>
      <p id="login-error"></p>
    </div>
  </div>

  <!-- Tab bar -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="chat">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      chat
    </button>
    <button class="tab-btn" data-tab="skills">
      <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      skills
    </button>
    <button class="tab-btn" data-tab="cron">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      cron
    </button>
    <button class="tab-btn" data-tab="task">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      task
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      settings
    </button>
  </nav>

  <!-- Chat panel -->
  <div class="tab-panel active" id="panel-chat">
    <div id="chat-messages"></div>
    <div id="input-bar">
      <button id="btn-mic">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <textarea id="input-text" rows="1" placeholder="何をしたいですか？"></textarea>
      <button id="btn-send">
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Placeholder panels -->
  <div class="tab-panel" id="panel-skills"><div class="panel-placeholder">skills — coming soon</div></div>
  <div class="tab-panel" id="panel-cron"><div class="panel-placeholder">cron — coming soon</div></div>
  <div class="tab-panel" id="panel-task"><div class="panel-placeholder">task — coming soon</div></div>
  <div class="tab-panel" id="panel-settings"><div class="panel-placeholder">settings — coming soon</div></div>

  <script src="/app.js"></script>
</body>
</html>
