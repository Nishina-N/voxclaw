<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="/manifest.json" />
  <title>Gemiclaw Voice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a8b4ff;
    }

    #status {
      font-size: 0.9rem;
      color: #888;
    }

    #btn-record {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #a8b4ff;
      background: #16213e;
      color: #a8b4ff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #btn-record:active { transform: scale(0.95); }
    #btn-record.recording {
      background: #a8b4ff;
      color: #1a1a2e;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #16213e;
      border-radius: 12px;
      padding: 1rem;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.6;
      min-height: 1.6em;
      white-space: pre-wrap;
    }

    #intent-area {
      width: 100%;
      max-width: 480px;
      background: #16213e;
      border-radius: 12px;
      padding: 1rem;
      border: 1px solid #2a2a4e;
    }

    #intent-area h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.5rem;
    }

    #intent-text {
      width: 100%;
      font-size: 0.95rem;
      line-height: 1.6;
      min-height: 3.2em;
      white-space: pre-wrap;
      color: #e0e0e0;
      margin-bottom: 0.75rem;
      background: transparent;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      padding: 0.4rem 0.5rem;
      resize: vertical;
      font-family: inherit;
    }

    #intent-text:focus {
      outline: none;
      border-color: #a8b4ff;
    }

    #intent-area.has-intent {
      border-color: #a8b4ff;
    }

    #btn-confirm {
      width: 100%;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: none;
      background: #a8b4ff;
      color: #1a1a2e;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #btn-confirm:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #btn-confirm:not(:disabled):active {
      opacity: 0.8;
    }

    /* テキスト入力エリア */
    #text-input-area {
      width: 100%;
      max-width: 480px;
      background: #16213e;
      border-radius: 12px;
      padding: 1rem;
      border: 1px solid #2a2a4e;
    }

    #text-input-area h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 0.5rem;
    }

    #text-input {
      width: 100%;
      font-size: 0.95rem;
      line-height: 1.6;
      min-height: 4em;
      color: #e0e0e0;
      background: transparent;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      padding: 0.4rem 0.5rem;
      resize: vertical;
      font-family: inherit;
      margin-bottom: 0.75rem;
    }

    #text-input::placeholder {
      color: #444;
    }

    #text-input:focus {
      outline: none;
      border-color: #a8b4ff;
    }

    #btn-text-send {
      width: 100%;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid #a8b4ff;
      background: transparent;
      color: #a8b4ff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #btn-text-send:active {
      background: #a8b4ff;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <h1>Gemiclaw Voice</h1>
  <p id="status">接続中...</p>

  <button id="btn-record">● 話す</button>

  <div id="intent-area">
    <h2>推定された意図（編集可）</h2>
    <textarea id="intent-text" placeholder="（会話すると意図が表示されます）"></textarea>
    <button id="btn-confirm" disabled>OK → Gemiclaw に送信</button>
  </div>

  <div id="text-input-area">
    <h2>テキストで直接入力</h2>
    <textarea id="text-input" placeholder="ここに入力して送信できます（電車内など音声が使えない場合）"></textarea>
    <button id="btn-text-send">送信 → Gemiclaw へ</button>
  </div>

  <div class="card">
    <h2>Gemiclaw の返答</h2>
    <p id="reply"></p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
