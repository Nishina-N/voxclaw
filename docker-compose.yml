services:
  voxclaw:
    build: .
    container_name: voxclaw_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HTTP_API_PORT=3001
    depends_on:
      - keybinder
    volumes:
      # Persistent storage: SQLite DB and memory logs
      - ./memory:/app/memory
      # Bot behavior config (channels.json etc.): read/write by the agent
      - ./config:/app/config
      # Agent workspace: read/write by the agent
      - ./workspace:/app/workspace
      # Knowledge base: read-only reference documents
      - ./knowledge:/app/knowledge:ro
      # Prompt files (system rules — read-only)
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./TOOLS.md:/app/TOOLS.md:ro
      # Prompt files (personality/user info — writable by the agent)
      - ./SOUL.md:/app/SOUL.md
      - ./USER.md:/app/USER.md
      - ./IDENTITY.md:/app/IDENTITY.md

  keybinder:
    build: ./keybinder
    container_name: voxclaw_keybinder
    restart: unless-stopped
    volumes:
      # secrets はこのコンテナにのみマウント — voxclaw コンテナからはアクセス不可
      - ./keybinder/secrets_for_skills.json:/secrets/keys.json:ro
      # Google OAuth2 token (run keybinder/setup_google_auth.py first to generate this)
      - ./keybinder/token.json:/secrets/google_token.json

  voice-pwa-backend:
    build: ./voice-pwa/backend
    container_name: voxclaw_voice_backend
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VOXCLAW_API_URL=http://voxclaw:3001
      - VOICE_BACKEND_PORT=8080
    depends_on:
      - voxclaw

  voice-pwa-frontend:
    build: ./voice-pwa/frontend
    container_name: voxclaw_voice_frontend
    restart: unless-stopped
    depends_on:
      - voice-pwa-backend
    ports:
      - "3000:80"

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: voxclaw_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel
