services:
  voxclaw:
    build: .
    container_name: voxclaw_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HTTP_API_PORT=3001
      - TZ=${TZ:-Asia/Tokyo}
    depends_on:
      - keybinder
    volumes:
      # Persistent storage: SQLite DB and memory logs
      - ./memory:/app/memory
      # Bot behavior config (channels.json, cron.json): read/write by the agent
      - ./config:/app/config
      # Dynamic functions and skill recipes: read/write by the agent
      - ./functions:/app/functions
      - ./skills:/app/skills
      # Agent workspace: read/write by the agent
      - ./workspace:/app/workspace
      # Media output (generated images etc.): read/write by the agent
      - ./media:/app/media
      # Knowledge base: read-only reference documents
      - ./knowledge:/app/knowledge:ro
      # Prompt files (system rules — read-only)
      - ./prompts/AGENTS.md:/app/prompts/AGENTS.md:ro
      - ./prompts/TOOLS.md:/app/prompts/TOOLS.md:ro
      # Prompt files (personality/user info — writable by the agent)
      - ./prompts/SOUL.md:/app/prompts/SOUL.md
      - ./prompts/USER.md:/app/prompts/USER.md
      - ./prompts/IDENTITY.md:/app/prompts/IDENTITY.md

  keybinder:
    build: ./keybinder
    container_name: voxclaw_keybinder
    restart: unless-stopped
    environment:
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:3000}
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      # secrets はこのコンテナにのみマウント — voxclaw コンテナからはアクセス不可
      # ディレクトリごとマウント: keybinder/secrets/ 配下のファイルはすべて .gitignore 対象
      - ./keybinder/secrets:/secrets

  voice-pwa-backend:
    build: ./voice-pwa/backend
    container_name: voxclaw_voice_backend
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VOICE_GEMINI_MODEL=${VOICE_GEMINI_MODEL}
      - VOXCLAW_API_URL=http://voxclaw:3001
      - VOICE_BACKEND_PORT=8080
      - PWA_PASSWORD=${PWA_PASSWORD:-123456}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - TZ=${TZ:-Asia/Tokyo}
    depends_on:
      - voxclaw
    volumes:
      - ./skills:/app/skills:ro
      - ./functions:/app/functions:ro
      - ./config/cron.json:/app/config/cron.json
      - ./media:/app/media

  voice-pwa-frontend:
    build: ./voice-pwa/frontend
    container_name: voxclaw_voice_frontend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    depends_on:
      - voice-pwa-backend
    ports:
      - "3000:80"

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: voxclaw_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel
