services:
  gemiclaw:
    build: .
    container_name: gemiclaw_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Bind the host's Docker socket so gemiclaw can spawn sibling sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount memory for persistent logs
      - ./memory:/app/memory
      # Mount workspace for creating files and reading local projects
      - ./workspace:/app/workspace
      # Mount knowledge directory for reading specific external knowledge or documents
      - ./knowledge:/app/knowledge
      # Mount prompts so they can be edited without rebuilding the container
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./SOUL.md:/app/SOUL.md:ro
      - ./USER.md:/app/USER.md:ro
      - ./TOOLS.md:/app/TOOLS.md:ro
      - ./IDENTITY.md:/app/IDENTITY.md:ro
